set -g status "on"
set -g status-justify "left"
set -g status-keys emacs
set -g status-left ""
set -g status-left-length "100"
set -g status-position bottom
set -g status-right " #S "
set -g status-right-length "40"

setw -g window-status-separator ""

# github-colorblind palette (light) — see docs/colorschemes/github-colorblind.md
set -g status-style "bg=default,fg=#59636e"
set -g pane-border-style "bg=default,fg=#d1d9e0"
set -g pane-active-border-style "bg=default,fg=#0969da"
setw -g window-status-format "#[bg=#eff2f5,fg=#1f2328] #I #[bg=#f6f8fa,fg=#1f2328] #{b:pane_current_path} "
setw -g window-status-current-format "#[bold,fg=#ffffff,bg=#0969da] #I #[bold,fg=#ffffff,bg=#218bff] #{b:pane_current_path} "
