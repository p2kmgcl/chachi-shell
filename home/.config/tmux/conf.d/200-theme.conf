set -g status "on"
set -g status-justify "left"
set -g status-keys emacs
set -g status-left ""
set -g status-left-length "100"
set -g status-position bottom
set -g status-right " #S "
set -g status-right-length "40"

setw -g window-status-separator ""

set -g status-style "bg=default,fg=colour7"
set -g pane-border-style "bg=default,fg=#D0D7DE"
set -g pane-active-border-style "bg=default,fg=#D0D7DE"
setw -g window-status-format "#[bg=colour253,fg=colour0] #I #[bg=colour255,fg=colour0] #{b:pane_current_path} "
setw -g window-status-current-format "#[bold,fg=colour255,bg=colour25] #I #[bold,fg=colour255,bg=colour27] #{b:pane_current_path} "
