customCommands:
  - key: 'C'
    context: 'files'
    description: 'Commit with generated message'
    command: 'TMPFILE=$(mktemp) && ~/.config/git/global-hooks/prepare-commit-msg "$TMPFILE" && git commit --edit --file="$TMPFILE"; rm -f "$TMPFILE"'
    output: terminal
confirmOnQuit: false
os:
  editPreset: 'nvim-remote'
gui:
  sidePanelWidth: 0.2
  expandFocusedSidePanel: true
  showFileTree: true
  showBottomLine: false
  showCommandLog: false
  showRandomTip: false
  border: rounded
  nerdFontsVersion: '3'
  filterMode: fuzzy
  commitLength:
    show: true
  # github-colorblind palette (light) — see docs/colorschemes/github-colorblind.md
  theme:
    activeBorderColor: ['#0969da', bold]   # accent emphasis
    inactiveBorderColor: ['#d1d9e0']       # border default
    optionsTextColor: ['#0969da']          # accent / link
    selectedLineBgColor: ['#ddf4ff']       # accent muted
    selectedRangeBgColor: ['#ddf4ff']
    cherryPickedCommitFgColor: ['#0969da'] # accent
    cherryPickedCommitBgColor: ['#ddf4ff']
    markedBaseCommitFgColor: ['#9a6700']   # attention
    markedBaseCommitBgColor: ['#fff8c5']   # attention muted
    unstagedChangesColor: ['#bc4c00']      # danger (orange)
    defaultFgColor: ['#1f2328']            # fg default
git:
  pagers:
    - colorarg: always
      pager: delta --paging=never --hunk-header-style=omit --file-decoration-style=ul
  mainBranches:
    - master
    - main
    - preprod
    - devel
  log:
    showGraph: always
    format: oneline
  branchLogCmd: git log --graph --color=always --pretty='%Cgreen%h %Cblue%an (%ar) %Creset%s' {{branchName}} --
  autoFetch: false
  fetchAll: true
  overrideGpg: true
  showWholeFileDiff: false
